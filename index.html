<!DOCTYPE html>
<html lang="ar">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<title>🎂 عيد ميلاد 🎂</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#240046,#9d4edd,#ff4d6d);
color:white;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding:20px 0;
}

.container{
width:90%;
max-width:380px;
background:rgba(0,0,0,0.4);
padding:20px;
border-radius:25px;
text-align:center;
}

.hidden{display:none}

/* الكيكة */
#cake-box{position:relative;margin-top:20px}
#cake{width:100%;border-radius:20px;animation:floatCake 2s infinite alternate;transition:1s}
@keyframes floatCake{from{transform:translateY(0)}to{transform:translateY(-10px)}}

.candles{position:absolute;top:-10px;left:0;right:0;display:flex;justify-content:center;gap:15px}
.candle{width:8px;height:30px;background:white;position:relative}
.candle::after{content:'';position:absolute;top:-8px;left:1px;width:6px;height:8px;background:orange;border-radius:50%;animation:flicker .3s infinite}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:.3}}

.cut{transform:translateX(-250px) rotate(-20deg);opacity:0}
</style>
</head>

<body>

<div class="container" id="login">

<div id="countdown"></div>

<div class="intro-text">💌 عندي ليك مفاجأة... اكتب الباسورد 😉</div>
<input type="password" id="pass">
<br>
<button onclick="check()">فتح</button>

<!-- الكيكة -->
<div id="cake-box">
  <img id="cake" src="https://images.unsplash.com/photo-1607478900766-efe13248b125?q=80&w=800">
  <div class="candles">
    <div class="candle"></div>
    <div class="candle"></div>
    <div class="candle"></div>
  </div>
</div>

<p id="error" style="display:none;color:red">❌ غلط</p>
</div>

<div id="content" class="hidden">
<h1>🎂 Happy Birthday 🎂</h1>
<p id="text"></p>

<video id="vid" controls>
<source src="https://files.catbox.moe/9nxznw.mp4">
</video>
</div>

<audio id="audio" src="https://files.catbox.moe/mo1uqz.m4a" loop></audio>

<div id="visits"></div>

<script>
let password="18/8/2008-5/4/2008";

function check(){
let p=document.getElementById("pass").value.trim();
let error=document.getElementById("error");

if(p===password){
openSite();
}else{
error.style.display="block";
}
}

document.getElementById("pass").addEventListener("input",function(){
if(this.value.trim()===password){
openSite();
}
});

function openSite(){

let login=document.getElementById("login");
let content=document.getElementById("content");

// تقطيع الكيكة
let cake=document.getElementById("cake");
if(cake){
cake.classList.add("cut");
}

// فتح الموقع بعد التقطيع
setTimeout(()=>{
login.style.display="none";
content.classList.remove("hidden");
},800);

// الصوت
let audio=document.getElementById("audio");
let vid=document.getElementById("vid");

if(audio){
audio.currentTime=0;
audio.play().catch(()=>{});
}

if(vid && audio){
vid.onplay=()=>audio.pause();
vid.onpause=()=>audio.play();
vid.onended=()=>audio.play();
}

// الكتابة
let text=document.getElementById("text");
let msg="🎂 كل سنة وانت طيب ❤️🎉";
let i=0;

function type(){
if(i<msg.length){
text.innerHTML+=msg[i];
i++;
setTimeout(type,50);
}
}
type();

// العداد
let countdown=document.getElementById("countdown");
setInterval(()=>{
let diff=new Date("2026-04-05")-new Date();
countdown.innerHTML=Math.floor(diff/1000);
},1000);

// الزيارات
let visits=document.getElementById("visits");
let v=localStorage.getItem("visits")||0;
v++;
localStorage.setItem("visits",v);
visits.innerText="👀 "+v;
}
</script>

</body>
</html>
