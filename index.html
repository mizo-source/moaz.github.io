<!DOCTYPE html>
<html lang="ar">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<title>🎂 عيد ميلاد 🎂</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#240046,#9d4edd,#ff4d6d);
color:white;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
overflow-y:auto;
padding:20px 0;
}

.container{
width:90%;
max-width:380px;
background:rgba(0,0,0,0.4);
padding:20px;
border-radius:25px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(255,255,255,0.2);
text-align:center;
animation:fadeIn 1.5s;
max-height:90vh;
overflow-y:auto;
}

.hidden{display:none}

</style>
</head>

<body>

<!-- بالونات -->
<script>
for(let i=0;i<10;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"%";
b.style.background = `hsl(${Math.random()*360},70%,60%)`;
b.style.animationDuration=(6+Math.random()*5)+"s";
document.body.appendChild(b);
}
</script>

<div class="container" id="login">

<div id="countdown"></div>

<div class="intro-text">💌 عندي ليك مفاجأة... اكتب الباسورد 😉</div>

<input type="password" id="pass" placeholder="الباسورد">
<br>
<button onclick="check()">فتح</button>

<p id="error" style="color:red;display:none">❌ غلط</p>

</div>

<div id="content" class="hidden">

<h1>🎂 Happy Birthday 🎂</h1>

<p id="text">كل سنة 🎉❤️</p>

<img src="https://files.catbox.moe/e0avra.jpeg">

<div class="video-box">
<div class="video-text">🙂🤍 فاكره الفديو ده</div>
<video id="vid" controls>
<source src="https://files.catbox.moe/9nxznw.mp4" type="video/mp4">
</video>
</div>

</div>

<audio id="audio" src="https://files.catbox.moe/mo1uqz.m4a" loop></audio>

<div id="visits"></div>

<script>
let password = "18/8/2008-5/4/2008";

function check(){
let p = document.getElementById("pass").value.trim();

if(p === password){
openSite();
}else{
let login = document.getElementById("login");
let error = document.getElementById("error");

login.classList.add("shake");
setTimeout(()=>login.classList.remove("shake"),300);
error.style.display="block";
}
}

document.getElementById("pass").addEventListener("input", function(){
if(this.value.trim() === password){
openSite();
}
});

function openSite(){

let login = document.getElementById("login");
let content = document.getElementById("content");

setTimeout(()=>{
login.style.display="none";
content.classList.remove("hidden");
},500);

let vid = document.getElementById("vid");
let audio = document.getElementById("audio");

if(audio){
audio.play().catch(()=>{});
}

if(vid && audio){
vid.addEventListener("play", () => audio.pause());
vid.addEventListener("pause", () => audio.play().catch(()=>{}));
vid.addEventListener("ended", () => audio.play().catch(()=>{}));
}

let text = document.getElementById("text");
let msg = "كل سنة وانتي طيبة ❤️🎂";
let i = 0;

function type(){
if(i < msg.length){
text.innerHTML += msg[i];
i++;
setTimeout(type, 50);
}
}
type();
}

// العداد
let countdown = document.getElementById("countdown");
let target=new Date("2026-04-05");

setInterval(()=>{
let now=new Date();
let diff=target-now;

let d=Math.floor(diff/86400000);
let h=Math.floor(diff/3600000%24);
let m=Math.floor(diff/60000%60);
let s=Math.floor(diff/1000%60);

countdown.innerHTML=
`<div>${d} يوم ${h} ساعة ${m} دقيقة ${s} ثانية</div>`;
},1000);

// عدد الزيارات
let visits = document.getElementById("visits");
let v=localStorage.getItem("visits")||0;
v++;
localStorage.setItem("visits",v);
visits.innerText="👀 "+v;

</script>

</body>
</html>
