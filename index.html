<!DOCTYPE html>
<html lang="ar">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<title>🎂 عيد ميلاد 🎂</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
body{
background:linear-gradient(135deg,#240046,#9d4edd,#ff4d6d);
color:white;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding:20px 0;
overflow-x:hidden;
direction:rtl;
}
.container{
width:90%;
max-width:400px;
background:rgba(0,0,0,0.5);
padding:20px;
border-radius:25px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(255,255,255,0.2);
text-align:center;
animation:fadeIn 1.5s;
overflow-y:auto;
}
.hidden{display:none;}
h1{font-size:26px;text-shadow:0 0 10px #fff,0 0 20px #ff4d6d;margin-bottom:10px;}
#text{font-size:18px;line-height:1.8;text-shadow:0 0 5px #fff,0 0 10px #ff4d6d;margin-top:10px;}
input,button{width:90%;padding:10px;margin:5px;border:none;border-radius:10px;}
button{background:#ff4d6d;color:white;cursor:pointer;transition:.3s;}
button:hover{transform:scale(1.05);box-shadow:0 0 15px #ff4d6d;}
.shake{animation:shake .3s;}
@keyframes shake{
0%,100%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
}
img,video{width:100%;border-radius:15px;margin-top:15px;object-fit:cover;}
.video-box{position:relative;margin-top:20px;}
.video-text{
position:absolute;top:10px;left:0;right:0;text-align:center;font-weight:bold;color:#fff;text-shadow:0 0 10px #ff4d6d;
animation:floatText 2s infinite;
}
@keyframes floatText{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.balloon{
position:fixed;bottom:-120px;width:40px;height:55px;border-radius:50%;opacity:.7;
animation:floatUp linear infinite;
}
@keyframes floatUp{to{transform:translateY(-130vh)}}
#cake-box{position:relative;margin-top:20px;}
#cake{width:100%;border-radius:20px;animation:floatCake 2s infinite alternate;}
@keyframes floatCake{0%{transform:translateY(0)}100%{transform:translateY(-10px)}}
.candles{position:absolute;top:-10px;left:0;right:0;display:flex;justify-content:center;gap:10px;}
.candle{width:10px;height:40px;background:white;display:inline-block;margin:2px;position:relative;}
.candle::after{content:'';position:absolute;top:-10px;left:2px;width:6px;height:10px;background:orange;border-radius:50%;animation:flicker .4s infinite;}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:0.3}}
#countdown{margin-bottom:15px;font-weight:bold;}
#visits{position:fixed;bottom:5px;width:100%;font-size:12px;text-align:center;opacity:.7;}
</style>
</head>
<body>

<!-- بالونات -->
<script>
for(let i=0;i<12;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"%";
b.style.background = `hsl(${Math.random()*360},70%,60%)`;
b.style.animationDuration=(6+Math.random()*5)+"s";
document.body.appendChild(b);
}
</script>

<div class="container" id="login">
<div id="countdown"></div>
<div class="intro-text">💌 عندي ليك مفاجأة... اكتب الباسورد 😉</div>
<input type="password" id="pass" placeholder="الباسورد">
<br>
<button onclick="check()">فتح</button>
<p id="error" style="color:red;display:none">❌ غلط</p>
</div>

<div class="container hidden" id="content">
<h1>🎂 Happy Birthday 🎂</h1>
<p id="text"></p>
<img src="https://files.catbox.moe/e0avra.jpeg">
<div class="video-box">
<div class="video-text">🙂🤍 فاكره الفديو ده</div>
<video id="vid" controls>
<source src="https://files.catbox.moe/9nxznw.mp4" type="video/mp4">
</video>
</div>

</div>

<audio id="audio" src="https://files.catbox.moe/mo1uqz.m4a" loop></audio>
<div id="visits"></div>

<script>
// الباسورد
let password = "18/8/2008-5/4/2008";
function check(){
let p = document.getElementById("pass").value.trim();
let login = document.getElementById("login");
let error = document.getElementById("error");
if(p===password){openSite()}else{
login.classList.add("shake");
setTimeout(()=>login.classList.remove("shake"),300);
error.style.display="block";
}}

// فتح تلقائي عند الكتابة
document.getElementById("pass").addEventListener("input", function(){
if(this.value.trim() === password){openSite()}
});

function openSite(){
let login = document.getElementById("login");
let content = document.getElementById("content");
setTimeout(()=>{login.style.display="none";content.classList.remove("hidden");},500);

let vid = document.getElementById("vid");
let audio = document.getElementById("audio");
if(audio) audio.play().catch(()=>{});
if(vid && audio){
vid.addEventListener("play",()=>audio.pause());
vid.addEventListener("pause",()=>audio.play().catch(()=>{}));
vid.addEventListener("ended",()=>audio.play().catch(()=>{}));
}

// نص متحرك + تقدر تضيف أي كلام بعده
let text = document.getElementById("text");
let msg = "كل سنة 🎉❤️"; // الكلام الأصلي
let extraMsg = " وانتي طيبة عارف ان الرساله معروفه وبايخه عمتا 🙂😅 بس كل سنه وانتي طيبه وعيد ميلاد سعيد يا حبيبتي وعقبال ١٠٠ سنه🫂  بس انا مش عاملها علشان عيد ميلادك بس  كمان عايز اقولك انا متوقعتش احبك الحب ده بجد انتي بقيتي كل  في حياتي عارفك زعلانه دلوقتي بس انا اسف ي روحي زمتزعليش مني  🥺  و ربنا ميحرمنيش منك ابدا ي حيات 🫂🫂💋 ❤️"; // تقدر تعدل هنا لإضافة نص بعده
let i=0;
function type(){if(i<msg.length){text.innerHTML+=msg[i];i++;setTimeout(type,50);}else{text.innerHTML+=extraMsg;}}
type();
}

// العداد
let countdown = document.getElementById("countdown");
let target=new Date("2026-04-05");
setInterval(()=>{
let now=new Date();
let diff=target-now;
let d=Math.max(0,Math.floor(diff/86400000));
let h=Math.max(0,Math.floor(diff/3600000%24));
let m=Math.max(0,Math.floor(diff/60000%60));
let s=Math.max(0,Math.floor(diff/1000%60));
countdown.innerHTML=`<div>${d} يوم ${h} ساعة ${m} دقيقة ${s} ثانية</div>`;
},1000);

// عدد الزيارات
let visits = document.getElementById("visits");
let v=localStorage.getItem("visits")||0;
v++;
localStorage.setItem("visits",v);
visits.innerText="👀 "+v;
</script>

</body>
</html>
