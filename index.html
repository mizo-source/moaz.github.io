<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🎂 Happy Birthday 🎂</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
background:linear-gradient(135deg,#1a0026,#3a0ca3,#ff4d6d);
overflow-x:hidden;
}

/* ⏳ */
.counter{
display:flex;
justify-content:center;
gap:10px;
margin-top:40px;
}
.box{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:15px;
box-shadow:0 0 15px pink;
}

/* 🔐 */
#loginBox{margin-top:40px;}
input{
padding:15px;
border-radius:30px;
border:none;
text-align:center;
font-size:18px;
}
button{
padding:12px 25px;
border-radius:25px;
border:none;
margin-top:10px;
background:linear-gradient(45deg,#ff4d6d,#7209b7);
color:white;
cursor:pointer;
}

/* ❌ اهتزاز */
.shake{animation:shake .3s;}
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

/* 🎉 */
#main{display:none;margin-top:20px;}

/* 🎈 */
.balloon{
position:fixed;
bottom:-100px;
width:40px;
height:60px;
border-radius:50%;
animation:rise 7s linear infinite;
}
@keyframes rise{
to{transform:translateY(-120vh);}
}

/* 🕯️ */
.candle{
display:inline-block;
width:10px;
height:40px;
background:white;
margin:3px;
position:relative;
}
.flame{
position:absolute;
top:-15px;
left:50%;
transform:translateX(-50%);
width:10px;
height:15px;
background:orange;
border-radius:50%;
animation:flicker .2s infinite alternate;
}
@keyframes flicker{
from{opacity:.6;}
to{opacity:1;}
}

/* 🎥 */
.videoBox{
position:relative;
width:90%;
margin:auto;
}
video{
width:100%;
border-radius:20px;
box-shadow:0 0 20px pink;
}
.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.4);
border-radius:20px;
font-size:22px;
cursor:pointer;
}

/* 👀 */
#visits{
position:fixed;
bottom:5px;
width:100%;
font-size:12px;
color:#ccc;
}
</style>
</head>

<body>

<!-- ⏳ -->
<div class="counter">
<div class="box"><span id="d"></span> يوم</div>
<div class="box"><span id="h"></span> ساعة</div>
<div class="box"><span id="m"></span> دقيقة</div>
<div class="box"><span id="s"></span> ثانية</div>
</div>

<!-- 🔐 -->
<div id="loginBox">
<h2>🔒 اكتب الباسورد</h2>
<input type="password" id="pass" oninput="checkPass()">
<br>
<button onclick="openMessage()">افتح</button>
</div>

<!-- 🎉 -->
<div id="main">

<h1>🎂 Happy Birthday 🎂</h1>

<!-- 🕯️ -->
<div>
<div class="candle"><div class="flame"></div></div>
<div class="candle"><div class="flame"></div></div>
<div class="candle"><div class="flame"></div></div>
</div>

<p id="text"></p>

<img src="https://files.catbox.moe/e0avra.jpeg" style="width:90%;border-radius:20px;margin-top:20px;">

<!-- 🎥 -->
<div class="videoBox">
<video id="vid">
<source src="https://files.catbox.moe/9nxznw.mp4">
</video>
<div class="overlay" onclick="playVideo()">اضغط لتشغيل الفيديو 🎥</div>
</div>

</div>

<!-- 🔊 -->
<audio id="music" src="https://files.catbox.moe/mo1uqz.m4a"></audio>

<!-- 👀 -->
<div id="visits">👀 عدد الزيارات: <span id="v"></span></div>

<script>

// ⏳
let target=new Date("2026-04-05");
setInterval(()=>{
let now=new Date();
let diff=target-now;
d.innerText=Math.floor(diff/86400000);
h.innerText=Math.floor(diff/3600000%24);
m.innerText=Math.floor(diff/60000%60);
s.innerText=Math.floor(diff/1000%60);
},1000);

// 🔐
let pass="54542008";

function checkPass(){
if(pass===document.getElementById("pass").value){
show();
}
}

function openMessage(){
if(pass===passInput()){
show();
}else{
let box=document.getElementById("loginBox");
box.classList.add("shake");
setTimeout(()=>box.classList.remove("shake"),300);
alert("❌ الباسورد غلط");
}
}

function passInput(){
return document.getElementById("pass").value;
}

// 🎯
function show(){
loginBox.style.display="none";
main.style.display="block";

music.play();

vid.onplay=()=>music.pause();

type();
}

// ✍️
let msg="🎂 كل سنة وانت طيب ❤️🎉";
let i=0;
function type(){
if(i<msg.length){
text.innerHTML+=msg[i++];
setTimeout(type,50);
}
}

// 🎥
function playVideo(){
document.querySelector(".overlay").style.display="none";
vid.play();
}

// 🎈
setInterval(()=>{
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"vw";
b.style.background=`hsl(${Math.random()*360},100%,60%)`;
document.body.appendChild(b);
setTimeout(()=>b.remove(),7000);
},500);

// 👀
let count=localStorage.getItem("visits");
count=count?+count+1:1;
localStorage.setItem("visits",count);
v.innerText=count;

</script>

</body>
</html>
