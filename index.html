<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 عيد ميلاد 🎂</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#5f0a87,#a4508b);
color:white;
text-align:center;
overflow:hidden;
}

.container{position:relative;z-index:10;padding:20px}

input{
padding:10px;
border:none;
border-radius:10px;
margin:10px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4081;
color:white;
cursor:pointer;
}

#error{color:red;display:none}

.hidden{display:none}

/* بالونات */
.balloon{
position:fixed;
bottom:-100px;
width:40px;
height:60px;
border-radius:50%;
animation:up 10s linear infinite;
z-index:0;
opacity:.7;
}
@keyframes up{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* صورة */
img{
width:250px;
height:250px;
object-fit:cover;
border-radius:20px;
}

/* فيديو */
.video-box{
position:relative;
width:90%;
max-width:300px;
margin:auto;
}
.video-text{
position:absolute;
top:10px;
left:0;
right:0;
color:white;
font-weight:bold;
}

/* شموع */
.candle{
display:inline-block;
width:10px;
height:40px;
background:white;
margin:5px;
position:relative;
}
.candle::after{
content:'';
position:absolute;
top:-10px;
left:2px;
width:6px;
height:10px;
background:orange;
border-radius:50%;
animation:flicker .5s infinite;
}
@keyframes flicker{
0%{opacity:1}
50%{opacity:.3}
100%{opacity:1}
}

/* عداد */
.counter{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
}
.box{
background:rgba(255,255,255,.1);
padding:15px;
border-radius:15px;
}

/* زيارات */
#visits{
position:fixed;
bottom:5px;
width:100%;
font-size:12px;
opacity:.7;
}
</style>
</head>

<body>

<!-- بالونات -->
<script>
for(let i=0;i<15;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"%";
b.style.background=`hsl(${Math.random()*360},70%,60%)`;
b.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(b);
}
</script>

<div class="container">

<!-- عداد قبل الدخول -->
<div id="countdown"></div>

<!-- باسورد -->
<div id="login">
<input type="password" id="pass" placeholder="اكتب الباسورد">
<br>
<button onclick="check()">فتح</button>
<div id="error">😝😝😝❌ الباسورد غلط</div>
</div>

<!-- المحتوى -->
<div id="content" class="hidden">

<h1>🎉 Happy Birthday 🎉</h1>

<div>
<div class="candle"></div>
<div class="candle"></div>
<div class="candle"></div>
</div>

<p>🎂 كل سنة وانت طيب ❤️🎉</p>

<img src="https://files.catbox.moe/e0avra.jpeg">

<br><br>

<div class="video-box">
<div class="video-text"> 🤍🙂 فاكره الفديو ده  ✍️</div>
<video id="vid" width="100%" controls>
<source src="https://files.catbox.moe/9nxznw.mp4" type="video/mp4">
</video>
</div>

<audio id="audio" src="https://files.catbox.moe/mo1uqz.m4a" autoplay loop></audio>

</div>

</div>

<div id="visits"></div>

<script>
// باسورد
function check(){
let p=document.getElementById("pass").value;
if(p==="18/8/2008-5/4/2008"){
document.getElementById("login").style.display="none";
document.getElementById("content").classList.remove("hidden");
document.getElementById("audio").play();
}else{
document.getElementById("error").style.display="block";
}
}

// دخول تلقائي
document.getElementById("pass").addEventListener("input",()=>{
if(document.getElementById("pass").value==="1234"){
check();
}
});

// عداد
let target=new Date("2026-04-05");
setInterval(()=>{
let now=new Date();
let diff=target-now;
let d=Math.floor(diff/1000/60/60/24);
let h=Math.floor(diff/1000/60/60)%24;
let m=Math.floor(diff/1000/60)%60;
let s=Math.floor(diff/1000)%60;
document.getElementById("countdown").innerHTML=
`<div class="counter">
<div class="box">${d}<br>يوم</div>
<div class="box">${h}<br>ساعة</div>
<div class="box">${m}<br>دقيقة</div>
<div class="box">${s}<br>ثانية</div>
</div>`;
},1000);

// منع الصوت مع الفيديو
let vid=document.getElementById("vid");
let audio=document.getElementById("audio");
vid.onplay=()=>audio.pause();
vid.onpause=()=>audio.play();

// زيارات
let v=localStorage.getItem("visits")||0;
v++;
localStorage.setItem("visits",v);
document.getElementById("visits").innerText="عدد الزيارات: "+v;
</script>

</body>
</html>
