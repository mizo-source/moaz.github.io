<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 عيد ميلاد 🎂</title>

<!-- 🔤 خط احترافي -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#240046,#9d4edd,#ff4d6d);
color:white;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* 🎬 دخول ناعم */
.container{
opacity:0;
transform:translateY(50px);
animation:fadeIn 1.5s forwards;
}

@keyframes fadeIn{
to{opacity:1;transform:translateY(0)}
}

/* 💎 بوكس احترافي */
.container{
width:90%;
max-width:380px;
background:rgba(0,0,0,0.4);
padding:20px;
border-radius:25px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(255,255,255,0.2);
text-align:center;
z-index:10;
}

/* 🔥 عنوان مضيء */
h1{
font-size:26px;
text-shadow:0 0 10px #fff,0 0 20px #ff4d6d;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 5px #fff}
to{text-shadow:0 0 20px #ff4d6d}
}

/* ⏳ عداد */
.counter{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.box{
flex:1;
margin:3px;
padding:10px;
border-radius:15px;
background:rgba(255,255,255,0.1);
}

/* 🔐 */
input,button{
width:80%;
padding:10px;
border:none;
border-radius:10px;
margin:5px;
}

button{
background:#ff4d6d;
color:white;
cursor:pointer;
}

/* ❌ اهتزاز */
.shake{animation:shake .3s;}
@keyframes shake{
0%,100%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
}

/* 🖼️ صورة */
img{
width:100%;
height:200px;
object-fit:cover;
border-radius:15px;
margin-top:10px;
}

/* 🎥 فيديو */
.video-box{
position:relative;
margin-top:10px;
}
video{
width:100%;
border-radius:15px;
}
.video-text{
position:absolute;
top:10px;
left:0;
right:0;
font-size:18px;
font-weight:bold;
}

/* 🕯️ شموع */
.candle{
width:10px;
height:40px;
background:white;
display:inline-block;
margin:5px;
position:relative;
}
.candle::after{
content:'';
position:absolute;
top:-10px;
left:2px;
width:6px;
height:10px;
background:orange;
border-radius:50%;
animation:flicker .4s infinite;
}
@keyframes flicker{
0%,100%{opacity:1}
50%{opacity:.3}
}

/* 🎈 بالونات */
.balloon{
position:fixed;
bottom:-100px;
width:40px;
height:60px;
border-radius:50%;
opacity:.5;
animation:float linear infinite;
z-index:0;
}
@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* 👀 زيارات */
#visits{
position:fixed;
bottom:5px;
width:100%;
font-size:12px;
opacity:.7;
text-align:center;
}

.hidden{display:none}
</style>
</head>

<body>

<!-- 🎈 بالونات -->
<script>
for(let i=0;i<8;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=(i*12)+"%";
b.style.background=`hsl(${Math.random()*360},70%,60%)`;
b.style.animationDuration=(6+Math.random()*4)+"s";
document.body.appendChild(b);
}
</script>

<div class="container">

<!-- ⏳ العداد -->
<div id="countdown"></div>

<!-- 🔐 تسجيل -->
<div id="login">
<input type="password" id="pass" placeholder="الباسورد">
<br>
<button onclick="check()">فتح</button>
<p id="error" style="color:red;display:none">❌ الباسورد غلط</p>
</div>

<!-- 🎉 المحتوى -->
<div id="content" class="hidden">

<h1>🎂 Happy Birthday 🎂</h1>

<div>
<div class="candle"></div>
<div class="candle"></div>
<div class="candle"></div>
</div>

<p>🎂 كل سنة وانت طيب ❤️🎉</p>

<img src="https://files.catbox.moe/e0avra.jpeg">

<div class="video-box">
<div class="video-text">فاكره الفديو ده 🙂🤍</div>
<video id="vid" controls>
<source src="https://files.catbox.moe/9nxznw.mp4">
</video>
</div>

</div>

</div>

<!-- 🔊 صوت -->
<audio id="audio" src="https://files.catbox.moe/mo1uqz.m4a" loop></audio>

<!-- 👀 زيارات -->
<div id="visits"></div>

<script>

// 🔐 باسورد
let password="18/8/2008-5/4/2008";

function check(){
let p=document.getElementById("pass").value;

if(p===password){
openSite();
}else{
let box=document.getElementById("login");
box.classList.add("shake");
setTimeout(()=>box.classList.remove("shake"),300);
document.getElementById("error").style.display="block";
}
}

// دخول تلقائي
document.getElementById("pass").addEventListener("input",()=>{
if(document.getElementById("pass").value===password){
openSite();
}
});

// فتح الموقع
function openSite(){
document.getElementById("login").style.display="none";
document.getElementById("content").classList.remove("hidden");

let audio=document.getElementById("audio");
audio.play();

document.getElementById("vid").onplay=()=>audio.pause();
document.getElementById("vid").onpause=()=>audio.play();
}

// ⏳ عداد
let target=new Date("2026-04-05");
setInterval(()=>{
let now=new Date();
let diff=target-now;

let d=Math.floor(diff/86400000);
let h=Math.floor(diff/3600000%24);
let m=Math.floor(diff/60000%60);
let s=Math.floor(diff/1000%60);

document.getElementById("countdown").innerHTML=
`<div class="counter">
<div class="box">${d} 🎂</div>
<div class="box">${h} ⏰</div>
<div class="box">${m} ⌛</div>
<div class="box">${s} ⚡</div>
</div>`;
},1000);

// 👀 زيارات
let v=localStorage.getItem("visits")||0;
v++;
localStorage.setItem("visits",v);
document.getElementById("visits").innerText="👀 "+v;

</script>

</body>
</html>
