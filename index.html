<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔤 خط Cairo -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<title>🎂 عيد ميلاد 🎂</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#240046,#9d4edd,#ff4d6d);
color:white;

display:flex;
justify-content:center;
align-items:flex-start;

min-height:100vh;
overflow-y:auto;
padding:20px 0;
}

/* 🎬 دخول */
.container{
width:90%;
max-width:380px;
background:rgba(0,0,0,0.4);
padding:20px;
border-radius:25px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(255,255,255,0.2);
text-align:center;

animation:fadeIn 1.5s;
max-height:90vh;
overflow-y:auto;
scroll-behavior:smooth;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

/* 🔥 عنوان */
h1{
font-size:26px;
text-shadow:0 0 10px #fff,0 0 20px #ff4d6d;
animation:glow 2s infinite alternate;
margin-bottom:10px;
}
@keyframes glow{
from{text-shadow:0 0 5px #fff}
to{text-shadow:0 0 20px #ff4d6d}
}

/* ⏳ */
.counter{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}
.box{
flex:1;
margin:3px;
padding:10px;
border-radius:15px;
background:rgba(255,255,255,0.1);
}

/* 💌 */
.intro-text{
margin-bottom:15px;
font-size:15px;
line-height:1.8;
text-shadow:0 0 8px rgba(255,255,255,0.4);
animation:fadeText 2s infinite alternate;
}
@keyframes fadeText{
from{opacity:.6}
to{opacity:1}
}

/* 🔐 */
input,button{
width:80%;
padding:10px;
border:none;
border-radius:10px;
margin:5px;
}
button{
background:#ff4d6d;
color:white;
cursor:pointer;
transition:.3s;
}
button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #ff4d6d;
}
/* ❌ */
.shake{animation:shake .3s;}
@keyframes shake{
0%,100%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
}

/* ✍️ كتابة */
#text{
font-size:18px;
line-height:1.8;
text-shadow:0 0 5px #fff,0 0 10px #ff4d6d;
animation:pulse 2s infinite;
margin-top:15px;
}
@keyframes pulse{
0%,100%{transform:scale(1)}
50%{transform:scale(1.05)}
}

/* 🖼️ */
img{
width:100%;
height:200px;
object-fit:cover;
border-radius:15px;
margin-top:20px;
transition:.3s;
}
img:hover{transform:scale(1.03)}

/* 🎥 */
.video-box{
position:relative;
margin-top:20px;
}
video{
width:100%;
border-radius:15px;
}
.video-text{
position:absolute;
top:10px;
left:0;
right:0;
font-weight:bold;
}

/* 🕯️ */
.candle{
width:10px;
height:40px;
background:white;
display:inline-block;
margin:5px;
position:relative;
}
.candle::after{
content:'';
position:absolute;
top:-10px;
left:2px;
width:6px;
height:10px;
background:orange;
border-radius:50%;
animation:flicker .4s infinite;
}
@keyframes flicker{
0%,100%{opacity:1}
50%{opacity:.3}
}

/* 🎈 بالونات */
.balloon{
position:fixed;
bottom:-120px;
width:45px;
height:65px;
border-radius:50%;
opacity:.7;
animation:floatUp linear infinite, sway 3s infinite;
z-index:0;
}
.balloon::after{
content:'';
position:absolute;
top:65px;
left:50%;
width:2px;
height:60px;
background:linear-gradient(white,transparent);
transform:translateX(-50%);
animation:swing 2s infinite;
}
.balloon::before{
content:'';
position:absolute;
top:58px;
left:50%;
width:8px;
height:8px;
background:#fff;
border-radius:50%;
transform:translateX(-50%);
}
@keyframes floatUp{to{transform:translateY(-130vh)}}
@keyframes sway{0%,100%{margin-left:0}50%{margin-left:15px}}
@keyframes swing{0%,100%{transform:translateX(-50%) rotate(5deg)}50%{transform:translateX(-50%) rotate(-5deg)}}

/* 👀 */
#visits{
position:fixed;
bottom:5px;
width:100%;
font-size:12px;
text-align:center;
opacity:.7;
}

.hidden{display:none}
</style>
</head>

<body>

<script>
for(let i=0;i<10;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"%";
b.style.background=`hsl(${Math.random()*360},70%,60%)`;
b.style.animationDuration=(6+Math.random()*5)+"s";
document.body.appendChild(b);
}
let vid = document.querySelector("video");
let audio = document.getElementById("audio");

/* لما الفيديو يشتغل */
vid.onplay = () => {
audio.pause();
}

/* لما الفيديو يقف */
vid.onpause = () => {
audio.play();
}
</script>

<div class="container">

<div id="countdown"></div>

<div id="login">
<div class="intro-text">💌 عندي ليك مفاجأة... اكتب الباسورد 😉</div>

<input type="password" id="pass" placeholder="الباسورد">
<br>
<button onclick="check()">فتح</button>
<p id="error" style="color:red;display:none">❌ غلط</p>
</div>

<div id="content" class="hidden">

<h1>🎂 Happy Birthday 🎂</h1>

<div>
<div class="candle"></div>
<div class="candle"></div>
<div class="candle"></div>
</div>

<p id="text"></p>

<img src="https://files.catbox.moe/e0avra.jpeg">

<div class="video-box">

<div class="video-text">فاكره الفديو ده 🙂🤍</div>

<video controls playsinline>
<source src="https://files.catbox.moe/9nxznw.mp4" type="video/mp4">
متصفحك لا يدعم تشغيل الفيديو
</video>

</div>

<style>
.video-box{
position:relative;
margin-top:20px;
}

video{
width:100%;
max-height:350px;
border-radius:15px;
object-fit:contain;
background:black;
}

/* 🔥 النص */
.video-text{
position:absolute;
top:10px;
left:0;
right:0;
text-align:center;
font-weight:bold;
font-size:18px;
color:#fff;
overflow:hidden;

/* ✨ Glow */
text-shadow:
0 0 5px #fff,
0 0 10px #ff4d6d,
0 0 20px #ff4d6d;

/* 💫 حركة */
animation:floatText 2s ease-in-out infinite;
}

/* 💫 حركة */
@keyframes floatText{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-5px)}
}

/* ✨ لمعة */
.video-text::after{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
animation:shine 3s infinite;
}

@keyframes shine{
100%{left:100%}
}
</style>

</div>
</div>

<audio id="audio" src="https://files.catbox.moe/mo1uqz.m4a" loop></audio>

<div id="visits"></div>

<script>
let password="18/8/2008-5/4/2008";

function check(){
let p=document.getElementById("pass").value;
if(p===password){openSite();}
else{
document.getElementById("login").classList.add("shake");
setTimeout(()=>login.classList.remove("shake"),300);
document.getElementById("error").style.display="block";
}
}

pass.oninput=()=>{
if(pass.value===password) openSite();
}

function openSite(){
login.style.display="none";
content.classList.remove("hidden");

audio.play();
let vid = document.querySelector("video");
let audio = document.getElementById("audio");

if(!vid || !audio) return;

vid.addEventListener("play", () => {
audio.pause();
});

vid.addEventListener("pause", () => {
audio.play().catch(()=>{});
});

vid.addEventListener("ended", () => {
audio.play().catch(()=>{});
});
let vid = document.querySelector("video");
let audio = document.getElementById("audio");

if(!vid || !audio) return;

/* لما الفيديو يشتغل */
vid.addEventListener("play", () => {
audio.pause();
});

/* لما الفيديو يقف */
vid.addEventListener("pause", () => {
audio.play();
});

/* لما الفيديو يخلص */
vid.addEventListener("ended", () => {
audio.play();
});


type();
}

let msg="🎂 كل سنة وانت طيب ❤️🎉";
let i=0;
function type(){
if(i<msg.length){
text.innerHTML+=msg[i];
i++;
setTimeout(type,50);
}
}

let target=new Date("2026-04-05");
setInterval(()=>{
let now=new Date();
let diff=target-now;

let d=Math.floor(diff/86400000);
let h=Math.floor(diff/3600000%24);
let m=Math.floor(diff/60000%60);
let s=Math.floor(diff/1000%60);

countdown.innerHTML=
`<div class="counter">
<div class="box">${d} 🎂</div>
<div class="box">${h} ⏰</div>
<div class="box">${m} ⌛</div>
<div class="box">${s} ⚡</div>
</div>`;
},1000);

let v=localStorage.getItem("visits")||0;
v++;
localStorage.setItem("visits",v);
visits.innerText="👀 "+v;
</script>

</body>
</html>
