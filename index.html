<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 عيد ميلاد</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial;
background:linear-gradient(135deg,#240046,#9d4edd,#ff4d6d);
color:white;
overflow:hidden;
}

/* دخول ناعم */
.container{
opacity:0;
transform:translateY(50px);
animation:fadeIn 1.5s forwards;
}

@keyframes fadeIn{
to{opacity:1;transform:translateY(0)}
}

/* بوكس احترافي */
.container{
position:relative;
margin:auto;
top:20px;
width:90%;
max-width:380px;
background:rgba(0,0,0,0.4);
border-radius:25px;
padding:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(255,255,255,0.2);
text-align:center;
}

/* عنوان مضيء */
h1{
font-size:28px;
margin-bottom:10px;
text-shadow:0 0 10px #fff,0 0 20px #ff4d6d,0 0 30px #ff4d6d;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 5px #fff}
to{text-shadow:0 0 20px #ff4d6d}
}

/* عداد */
.counter{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.box{
flex:1;
margin:3px;
padding:10px;
border-radius:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(5px);
}

/* باسورد */
input,button{
width:80%;
padding:10px;
border:none;
border-radius:10px;
margin:5px;
}

button{
background:#ff4d6d;
color:white;
}

/* صور */
img{
width:100%;
height:200px;
object-fit:cover;
border-radius:15px;
margin-top:10px;
}

/* فيديو */
video{
width:100%;
border-radius:15px;
margin-top:10px;
}

/* شموع */
.candle{
width:10px;
height:40px;
background:white;
display:inline-block;
margin:5px;
position:relative;
}

.candle::after{
content:'';
position:absolute;
top:-10px;
left:2px;
width:6px;
height:10px;
background:orange;
border-radius:50%;
animation:flicker .4s infinite;
}

@keyframes flicker{
0%,100%{opacity:1}
50%{opacity:.3}
}

/* بالونات ناعمة */
.balloon{
position:fixed;
bottom:-100px;
width:40px;
height:60px;
border-radius:50%;
opacity:.5;
animation:float linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* زيارات */
#visits{
position:fixed;
bottom:5px;
width:100%;
text-align:center;
font-size:12px;
opacity:.7;
}

.hidden{display:none}
</style>
</head>

<body>

<script>
for(let i=0;i<8;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=(i*12)+"%";
b.style.background=`hsl(${Math.random()*360},70%,60%)`;
b.style.animationDuration=(6+Math.random()*4)+"s";
document.body.appendChild(b);
}
</script>

<div class="container">

<div id="countdown"></div>

<div id="login">
<input type="password" id="pass" placeholder="الباسورد">
<br>
<button onclick="check()">فتح</button>
<p id="error" style="color:red;display:none">❌ غلط</p>
</div>

<div id="content" class="hidden">

<h1>🎉 Happy Birthday 🎉</h1>

<div>
<div class="candle"></div>
<div class="candle"></div>
<div class="candle"></div>
</div>

<p>🎂 كل سنة وانت طيب ❤️</p>

<img src="https://files.catbox.moe/e0avra.jpeg">

<video id="vid" controls>
<source src="https://files.catbox.moe/9nxznw.mp4">
</video>

<audio id="audio" src="https://files.catbox.moe/mo1uqz.m4a" autoplay loop></audio>

</div>
</div>

<div id="visits"></div>

<script>
function check(){
let p=document.getElementById("pass").value;
if(p==="18/8/2008-5/4/2008"){
document.getElementById("login").style.display="none";
document.getElementById("content").classList.remove("hidden");
document.getElementById("audio").play();
}else{
document.getElementById("error").style.display="block";
}
}

document.getElementById("pass").addEventListener("input",()=>{
if(document.getElementById("pass").value==="1234"){
check();
}
});

let target=new Date("2026-04-05");
setInterval(()=>{
let now=new Date();
let diff=target-now;

let d=Math.floor(diff/1000/60/60/24);
let h=Math.floor(diff/1000/60/60)%24;
let m=Math.floor(diff/1000/60)%60;
let s=Math.floor(diff/1000)%60;

document.getElementById("countdown").innerHTML=
`<div class="counter">
<div class="box">${d}<br>يوم</div>
<div class="box">${h}<br>ساعة</div>
<div class="box">${m}<br>دقيقة</div>
<div class="box">${s}<br>ثانية</div>
</div>`;
},1000);

let vid=document.getElementById("vid");
let audio=document.getElementById("audio");

vid.onplay=()=>audio.pause();
vid.onpause=()=>audio.play();

let v=localStorage.getItem("v")||0;
v++;
localStorage.setItem("v",v);
document.getElementById("visits").innerText="عدد الزيارات: "+v;
</script>

</body>
</html>
