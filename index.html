<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🎂 Happy Birthday 🎂</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
background:linear-gradient(135deg,#1a0026,#3a0ca3,#ff4d6d);
overflow-x:hidden;
}

/* 🔐 */
#loginBox{margin-top:120px;}
input{
padding:15px;
border-radius:30px;
border:none;
text-align:center;
font-size:18px;
}
button{
padding:12px 25px;
border-radius:25px;
border:none;
margin-top:10px;
background:linear-gradient(45deg,#ff4d6d,#7209b7);
color:white;
font-size:18px;
cursor:pointer;
}

/* ❌ اهتزاز */
.shake{animation:shake .3s;}
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

/* 🎉 */
#main{display:none;}

/* ⏳ */
.counter{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}
.box{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:15px;
box-shadow:0 0 15px pink;
min-width:70px;
}
.box span{font-size:22px;display:block;}

/* 💖 */
#text{
margin-top:30px;
font-size:22px;
width:80%;
margin-inline:auto;
}

/* 🖼️ */
img,video{
width:90%;
margin-top:20px;
border-radius:20px;
box-shadow:0 0 20px pink;
}

/* 🎈 */
.balloon{
position:fixed;
bottom:-100px;
width:40px;
height:60px;
border-radius:50%;
animation:rise 7s linear infinite;
}
@keyframes rise{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}

/* 🕯️ */
.candle{
display:inline-block;
width:10px;
height:40px;
background:white;
margin:3px;
position:relative;
}
.flame{
position:absolute;
top:-15px;
left:50%;
transform:translateX(-50%);
width:10px;
height:15px;
background:orange;
border-radius:50%;
animation:flicker .2s infinite alternate;
}
@keyframes flicker{
from{opacity:.6;}
to{opacity:1;}
}

/* 👀 */
#visits{
margin-top:20px;
font-size:18px;
}
</style>
</head>

<body>

<!-- 🔐 -->
<div id="loginBox">
<h2>🔒 اكتب الباسورد</h2>
<input type="password" id="pass" placeholder="الباسورد" oninput="checkPass()">
<br>
<button onclick="openMessage()">افتح</button>
</div>

<!-- 🎉 -->
<div id="main">

<h1>🎂 Happy Birthday 🎂</h1>

<!-- 🕯️ -->
<div>
<div class="candle"><div class="flame"></div></div>
<div class="candle"><div class="flame"></div></div>
<div class="candle"><div class="flame"></div></div>
<div class="candle"><div class="flame"></div></div>
<div class="candle"><div class="flame"></div></div>
</div>

<!-- ⏳ -->
<div class="counter">
<div class="box"><span id="days">0</span>يوم</div>
<div class="box"><span id="hours">0</span>ساعة</div>
<div class="box"><span id="minutes">0</span>دقيقة</div>
<div class="box"><span id="seconds">0</span>ثانية</div>
</div>

<!-- 👀 -->
<div id="visits">👀 عدد الزيارات: <span id="visitCount">0</span></div>

<!-- 💖 -->
<p id="text"></p>

<!-- 🖼️ -->
<img src="https://files.catbox.moe/e0avra.jpeg">

<!-- 🎥 -->
<video controls>
<source src="https://files.catbox.moe/9nxznw.mp4" type="video/mp4">
</video>

</div>

<!-- 🔊 -->
<audio id="music" src="https://files.catbox.moe/mo1uqz.m4a"></audio>

<script>

// 🔐 باسورد
let password="22288";

function checkPass(){
let val=document.getElementById("pass").value;
if(val===password){
show();
}
}

function openMessage(){
let val=document.getElementById("pass").value;

if(val===password){
show();
}else{
let box=document.getElementById("loginBox");
box.classList.add("shake");
setTimeout(()=>box.classList.remove("shake"),300);
alert("❌ الباسورد غلط");
}
}

// 🎯 فتح الموقع
function show(){
document.getElementById("loginBox").style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("music").play();

typeWriter();
}

// ✍️ كتابة
let msg="🎂 كل سنة وانت طيب ❤️🎉";
let i=0;
function typeWriter(){
if(i<msg.length){
document.getElementById("text").innerHTML+=msg.charAt(i);
i++;
setTimeout(typeWriter,50);
}
}

// ⏳ عداد
let target=new Date("2026-04-05T00:00:00");

setInterval(()=>{
let now=new Date();
let diff=target-now;

let d=Math.floor(diff/(1000*60*60*24));
let h=Math.floor(diff/(1000*60*60)%24);
let m=Math.floor(diff/(1000*60)%60);
let s=Math.floor(diff/1000%60);

document.getElementById("days").innerText=d;
document.getElementById("hours").innerText=h;
document.getElementById("minutes").innerText=m;
document.getElementById("seconds").innerText=s;
},1000);

// 🎈 بالونات
setInterval(()=>{
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"vw";
b.style.background=`hsl(${Math.random()*360},100%,60%)`;
document.body.appendChild(b);

setTimeout(()=>b.remove(),7000);
},500);

// 👀 زيارات
let count=localStorage.getItem("visits");
count=count?parseInt(count)+1:1;
localStorage.setItem("visits",count);
document.getElementById("visitCount").innerText=count;

</script>

</body>
</html>
